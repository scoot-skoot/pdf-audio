services:
  # Original one-shot CLI (unchanged usage): docker compose run --rm converter file.pdf
  converter:
    build: .
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    env_file:
      - .env

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdfaudio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    working_dir: /app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pdfaudio?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pdfaudio
    env_file:
      - .env
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
